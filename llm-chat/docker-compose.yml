services:

  # ── Qdrant 向量数据库 ─────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    pull_policy: missing
    container_name: chatflow-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT}:6333"
    volumes:
      - ${QDRANT_DATA_DIR}:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/6333"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── PostgreSQL 关系型数据库 ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    pull_policy: missing
    container_name: chatflow-postgres
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - ${POSTGRES_DATA_DIR}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis（含 RedisSearch 模块，用于语义缓存）────────────────────────────
  redis:
    image: redis/redis-stack:latest
    pull_policy: missing
    container_name: chatflow-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - ${REDIS_DATA_DIR}:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── Python FastAPI 后端 ────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: chatflow-backend:${APP_VERSION}
    pull_policy: never
    container_name: chatflow-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Linux 上让容器能访问宿主机（沙箱 SSH）
    volumes:
      - ${BACKEND_LOG_HOST_DIR}:/var/log/chatflow
      - ${SECRET_DIR:-/opt/secret}:/opt/secret:ro   # 密钥文件目录（只读，用于解密 ENC(...) 值）
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:${BACKEND_PORT}/api/tools || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Vue 前端（Nginx 静态服务 + API 反代）─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: chatflow-frontend:${APP_VERSION}
    pull_policy: never
    container_name: chatflow-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

networks:
  default:
    name: chatflow-network
