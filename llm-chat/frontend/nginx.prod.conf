# ── 后端 keepalive 连接池（减少 TCP 握手开销）────────────────────────────────
upstream chatflow_backend {
    server backend:8000;
    keepalive 64;          # 与后端保持的长连接数
    keepalive_requests 1000;
    keepalive_timeout 75s;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 最大请求体（图片上传）
    client_max_body_size 30m;

    # 连接超时
    client_header_timeout 15s;
    client_body_timeout   30s;
    send_timeout          30s;

    # Gzip 压缩（前端静态资源 + JSON 响应）
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        text/xml
        application/xml
        image/svg+xml
        font/woff2;

    # 静态资源长期缓存（vite 构建带 hash，可安全永久缓存）
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── API 反代 ──────────────────────────────────────────────────────────────
    # SSE（流式输出）必须禁用缓冲，否则 token 不会实时推送
    location /api/ {
        proxy_pass http://chatflow_backend;

        # HTTP/1.1 + 空 Connection 头 = 启用 keepalive
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 关键：关闭所有缓冲
        proxy_buffering            off;
        proxy_cache                off;
        proxy_request_buffering    off;
        chunked_transfer_encoding  on;

        # 超时：SSE 流可能持续数分钟
        proxy_connect_timeout  10s;
        proxy_send_timeout     30s;
        proxy_read_timeout    600s;
    }

    # SPA fallback（Vue Router history 模式）
    location / {
        try_files $uri $uri/ /index.html;
    }
}
